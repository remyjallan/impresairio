name: PR Agent review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-agent-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI review
    # Run on normal PR updates, and rerun when the explicit override label is
    # added or removed. Other label changes must not consume a provider call.
    if: github.event.sender.type != 'Bot' && github.event.pull_request.head.repo.full_name == github.repository && (github.event.action != 'labeled' && github.event.action != 'unlabeled' || (github.event.label != null && github.event.label.name == 'ai-review-override'))
    runs-on: ubuntu-latest
    env:
      PR_AGENT_NANOGPT_KEY: ${{ secrets.PR_AGENT_NANOGPT_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Explain missing configuration
        if: env.PR_AGENT_NANOGPT_KEY == '' && !(github.event.action == 'labeled' && github.event.label != null && github.event.label.name == 'ai-review-override')
        run: |
          echo "::error::PR-Agent cannot run because the PR_AGENT_NANOGPT_KEY repository secret is not configured."
          exit 1

      - name: Review pull request
        if: env.PR_AGENT_NANOGPT_KEY != '' && !(github.event.action == 'labeled' && github.event.label != null && github.event.label.name == 'ai-review-override')
        uses: The-PR-Agent/pr-agent@v0.35.0
        id: pragent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI__KEY: ${{ secrets.PR_AGENT_NANOGPT_KEY }}
          OPENAI__API_BASE: https://nano-gpt.com/api/v1legacy
          # LiteLLM strips the openai/ routing prefix before NanoGPT receives
          # the documented model ID: zai-org/glm-5.2.
          config.model: openai/zai-org/glm-5.2
          config.fallback_models: '[]'
          config.custom_model_max_tokens: '1000000'
          config.max_model_tokens: '64000'
          github_action_config.auto_review: 'true'
          github_action_config.auto_describe: 'false'
          github_action_config.auto_improve: 'false'
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize", "labeled", "unlabeled"]'
          github_action_config.enable_output: 'true'
          pr_reviewer.publish_output_no_suggestions: 'true'
          pr_reviewer.extra_instructions: >-
            Report only concrete, actionable defects introduced by this pull
            request. Do not report formatting or style that automated checks
            cover. Treat AGENTS.md as repository context and request tests
            only when the changed behavior needs one. Do not report speculative
            provider compatibility concerns when the endpoint and model ID
            match the provider's documented API; report them only with a
            concrete incompatibility or failure scenario.
            This workflow has been verified live with NanoGPT: the action
            receives OPENAI__KEY and OPENAI__API_BASE from the step environment,
            actions/checkout runs before the review, and enable_output exposes
            the structured review through steps.pragent.outputs.review. Do not
            report hypothetical failures of these mechanisms without a concrete
            contradiction in the changed YAML or an observed failed run. Do not
            include an item in key_issues_to_review when its own explanation
            concludes that no bug or security concern exists.

      - name: Explain PR-Agent execution failure
        if: >-
          always() &&
          !(github.event.action == 'labeled' && github.event.label != null && github.event.label.name == 'ai-review-override') &&
          (steps.pragent.outcome == 'failure' || steps.pragent.outcome == 'cancelled')
        run: |
          echo "::error::PR-Agent did not complete successfully; the AI review gate remains blocked."
          exit 1

      - name: Enforce AI review policy
        if: always()
        env:
          PR_REVIEW_OUTPUT: ${{ steps.pragent.outputs.review }}
          PR_REVIEW_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: node scripts/enforce-ai-review.mjs
