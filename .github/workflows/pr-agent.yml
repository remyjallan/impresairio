name: PR Agent review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: pr-agent-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: AI review
    if: >-
      github.event.sender.type != 'Bot' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PR_AGENT_OPENROUTER_KEY: ${{ secrets.PR_AGENT_OPENROUTER_KEY }}
    steps:
      - name: Explain missing configuration
        if: env.PR_AGENT_OPENROUTER_KEY == ''
        run: >-
          echo "::warning::PR-Agent is disabled because the
          PR_AGENT_OPENROUTER_KEY repository secret is not configured."

      - name: Review pull request
        if: env.PR_AGENT_OPENROUTER_KEY != ''
        uses: The-PR-Agent/pr-agent@v0.35.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          openrouter__key: ${{ secrets.PR_AGENT_OPENROUTER_KEY }}
          config.model: openrouter/z-ai/glm-5.2
          config.fallback_models: '[]'
          config.custom_model_max_tokens: '1000000'
          config.max_model_tokens: '64000'
          github_action_config.auto_review: 'true'
          github_action_config.auto_describe: 'false'
          github_action_config.auto_improve: 'false'
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
          openrouter.reasoning_effort: high
          openrouter.reasoning_max_tokens: '4096'
          openrouter.max_tokens: '2048'
          pr_reviewer.publish_output_no_suggestions: 'true'
          pr_reviewer.extra_instructions: >-
            Report only concrete, actionable defects introduced by this pull
            request. Do not report formatting or style that automated checks
            cover. Treat AGENTS.md as repository context and request tests
            only when the changed behavior needs one.
