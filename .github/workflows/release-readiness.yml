name: Release readiness

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Build releasable package (no publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: impresairio-npm-package
          path: '*.tgz'
          if-no-files-found: error
