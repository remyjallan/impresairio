name: Release readiness

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  package:
    name: Build releasable package (no publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
      - run: pnpm pack
      - uses: actions/upload-artifact@v4
        with:
          name: impresairio-npm-package
          path: '*.tgz'
          if-no-files-found: error
