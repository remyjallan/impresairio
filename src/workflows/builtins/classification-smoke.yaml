id: classification-smoke
name: Classification smoke
parameters:
  require-review:
    type: boolean
    default: true
steps:
  - id: classify
    type: agent
    actor: implementer
    capability: change-classification
    output:
      id: classification
      filename: "00 - Classification.md"
      storage: internal
    result:
      fields:
        complexity:
          type: enum
          values: [trivial, standard, complex]

  - id: review
    type: agent
    actor: reviewer
    capability: verification
    output:
      id: review
      filename: "01 - Review.md"
      storage: internal
    when:
      all:
        - equals:
            left:
              parameter: require-review
            right: true
        - notEquals:
            left:
              result:
                step: classify
                field: complexity
            right: trivial
